name: Auto Update Anime Info

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  schedule:
    # */30 artinya berjalan setiap kelipatan 30 menit (menit ke-0 dan menit ke-30)
    - cron: '*/30 * * * *' 
  workflow_dispatch:

jobs:
  update-anime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set timezone to Asia/Jakarta
        run: sudo timedatectl set-timezone Asia/Jakarta

      - name: Fetch Anime Season Info
        run: |
          # Mengambil data seasonal anime (limit 10)
          curl -s -f "https://api.jikan.moe/v4/seasons/now?limit=10" -o anime_temp.json
          if [ -s anime_temp.json ]; then
            mv anime_temp.json anime_update.json
          else
            echo "API Jikan sedang sibuk, skip update 30 menit ini."
          fi

      - name: Update README with Anime List
        run: |
          echo "# 🎬 Seasonal Anime Tracker" > README.md
          echo "" >> README.md
          echo "Last Sync: $(date '+%A, %d-%m-%Y %H:%M') WIB" >> README.md
          echo "" >> README.md
          echo "### 🌟 Top 10 Anime Ongoing:" >> README.md
          echo "" >> README.md
          # Parsing judul dari JSON ke bullet points
          grep -oP '"title":"\K[^"]+' anime_update.json | head -n 10 | sed 's/^/- /' >> README.md
          echo "" >> README.md
          echo "---" >> README.md
          echo "✨ *Updated automatically every 30 minutes (48 times/day) using GitHub Actions.*" >> README.md
          echo "Data source: [Jikan API](https://jikan.moe/)" >> README.md

      - name: Commit and push changes
        run: |
          git config user.name 'zertcihuyy'
          git config user.email 'zertt.idn@gmail.com'
          git add anime_update.json README.md
          # Gunakan timestamp yang lebih detail karena update lebih sering
          git commit -m "Auto Update: $(date '+%H:%M') WIB" || echo "No changes detected"
          git push
