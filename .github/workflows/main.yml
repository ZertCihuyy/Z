name: Auto Update Anime & Torrent Info

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  schedule:
    # Berjalan setiap 30 menit (48x sehari)
    - cron: '*/30 * * * *' 
  workflow_dispatch:

jobs:
  update-anime:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set timezone to Asia/Jakarta
        run: sudo timedatectl set-timezone Asia/Jakarta

      - name: Fetch Anime & Torrent Data
        run: |
          # 1. Ambil Data Seasonal dari Jikan
          curl -s -f "https://api.jikan.moe/v4/seasons/now?limit=5" -o seasonal.json
          
          # 2. Ambil Data Torrent Terbaru dari Animetosho (JSON API)
          # Kita ambil 10 rilisan terbaru
          curl -s -f "https://animetosho.org/api/feed?type=search&filter%5B0%5D%5Bt%5D=term&filter%5B0%5D%5Bv%5D=1080p" -o torrents.json
          
          # Menggabungkan data sederhana ke json utama
          echo "{\"last_sync\": \"$(date)\", \"seasonal\": $(cat seasonal.json), \"torrents\": $(cat torrents.json)}" > anime_update.json

      - name: Update README with Anime & Torrent Links
        run: |
          echo "# 🎬 Ultimate Seasonal & Torrent Tracker" > README.md
          echo "" >> README.md
          echo "Sync Terakhir: $(date '+%A, %d-%m-%Y %H:%M') WIB" >> README.md
          echo "" >> README.md
          
          echo "### 🌟 Sedang Tayang (Seasonal):" >> README.md
          grep -oP '"title":"\K[^"]+' seasonal.json | head -n 5 | sed 's/^/- /' >> README.md
          echo "" >> README.md
          
          echo "### 📥 Rilisan Terbaru (Animetosho 1080p):" >> README.md
          echo "| Judul File | Link |" >> README.md
          echo "| --- | --- |" >> README.md
          
          # Script ajaib untuk ambil judul dan link torrent dari json Animetosho
          # Menggunakan filter sederhana untuk mengambil nama file dan magnet link
          grep -oP '"title":"\K[^"]+' torrents.json | head -n 8 > titles.txt
          grep -oP '"link":"\K[^"]+' torrents.json | head -n 8 > links.txt
          
          paste -d "|" titles.txt links.txt | while IFS="|" read -r title link; do
            echo "| $title | [Download]($link) |" >> README.md
          done
          
          echo "" >> README.md
          echo "---" >> README.md
          echo "✨ *Automated by Zert-kun's System (Every 30 Mins)*" >> README.md
          echo "Sources: Jikan API & Animetosho" >> README.md

      - name: Commit and push changes
        run: |
          git config user.name 'zertcihuyy'
          git config user.email 'zertt.idn@gmail.com'
          git add anime_update.json README.md
          git commit -m "Zert-Bot Update: Anime & Torrent List $(date '+%H:%M') WIB" || echo "No changes detected"
          git push
          echo "# 🎬 Seasonal Anime Tracker" > README.md
          echo "" >> README.md
          echo "Last Sync: $(date '+%A, %d-%m-%Y %H:%M') WIB" >> README.md
          echo "" >> README.md
          echo "### 🌟 Top 10 Anime Ongoing:" >> README.md
          echo "" >> README.md
          # Parsing judul dari JSON ke bullet points
          grep -oP '"title":"\K[^"]+' anime_update.json | head -n 10 | sed 's/^/- /' >> README.md
          echo "" >> README.md
          echo "---" >> README.md
          echo "✨ *Updated automatically every 30 minutes (48 times/day) using GitHub Actions.*" >> README.md
          echo "Data source: [Jikan API](https://jikan.moe/)" >> README.md

      - name: Commit and push changes
        run: |
          git config user.name 'zertcihuyy'
          git config user.email 'zertt.idn@gmail.com'
          git add anime_update.json README.md
          # Gunakan timestamp yang lebih detail karena update lebih sering
          git commit -m "Auto Update: $(date '+%H:%M') WIB" || echo "No changes detected"
          git push
