name: AnimeTosho Issue Search Bot

permissions:
  issues: write    # Izin untuk membalas issue
  contents: write  # Izin untuk nge-push file JSON

on:
  issues:
    types: [opened] # Trigger HANYA 1 kali saat issue BARU dibuka

jobs:
  search-and-reply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set timezone to Asia/Jakarta
        run: sudo timedatectl set-timezone Asia/Jakarta

      - name: Fetch Data, Reply Issue, & Save JSON
        uses: actions/github-script@v7
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            const fs = require('fs');
            const issueTitle = context.payload.issue.title; // Menggunakan judul issue sebagai keyword
            const issueNumber = context.payload.issue.number;
            const issueUser = context.payload.issue.user.login;
            
            console.log(`Mencari anime untuk query: ${issueTitle}`);
            
            // 1. Fetch data dari Animetosho berdasarkan judul issue
            const query = encodeURIComponent(issueTitle);
            const toshoRes = await fetch(`https://feed.animetosho.org/json?q=${query}`);
            const toshoData = await toshoRes.json();
            
            // 2. Format balasan komentar
            let replyBody = `Yosh, halo @${issueUser}! 👋\nIni hasil pencarian dari AnimeTosho untuk keyword **"${issueTitle}"**:\n\n`;
            let resultsList = [];
            
            if (toshoData && toshoData.length > 0) {
              // Ambil maksimal 5 hasil teratas agar issue tidak terlalu panjang
              toshoData.slice(0, 5).forEach(t => {
                const hashMatch = t.magnet_uri.match(/btih:([a-zA-Z0-9]+)/i);
                const hash = hashMatch ? hashMatch[1] : '';
                const nyaaUrl = hash ? `https://nyaa.si/?q=${hash}` : `https://nyaa.si/?q=${encodeURIComponent(t.title)}`;
                const sizeMB = (t.size / 1024 / 1024).toFixed(2) + " MB";
                
                replyBody += `- **${t.title}**\n  📦 ${sizeMB} | [🌐 Tosho](${t.link}) | [🐱 Nyaa](${nyaaUrl})\n\n`;
                
                resultsList.push({
                  title: t.title,
                  size: sizeMB,
                  link_tosho: t.link,
                  magnet: t.magnet_uri
                });
              });
            } else {
              replyBody += "Gomenne, sepertinya data tidak ditemukan. 😢\n\n";
            }
            
            replyBody += `---\n_⚡ Bot auto-reply by zerty_. Bot hanya membalas 1 kali saat issue ini dibuka. Jika ingin mencari judul lain, silakan buka issue baru ya!_`;
            
            // 3. Post komentar otomatis ke dalam issue
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: replyBody
            });
            
            // 4. Update file JSON untuk riwayat pencarian
            const historyFile = 'anime_search_history.json';
            let historyData = [];
            
            if (fs.existsSync(historyFile)) {
              historyData = JSON.parse(fs.readFileSync(historyFile, 'utf8'));
            }
            
            historyData.push({
              issue_number: issueNumber,
              query: issueTitle,
              requested_by: issueUser,
              timestamp: new Date().toLocaleString('id-ID', { timeZone: 'Asia/Jakarta' }) + " WIB",
              results: resultsList
            });
            
            // Simpan format JSON dengan rapi
            fs.writeFileSync(historyFile, JSON.stringify(historyData, null, 2));

      - name: Commit and Push JSON
        run: |
          git config user.name 'zertcihuyy'
          git config user.email 'zertt.idn@gmail.com'
          git add anime_search_history.json
          git commit -m "Auto Update: Simpan history pencarian issue #${{ github.event.issue.number }} ke JSON" || echo "No changes to commit"
          git push
